name: Scheduled Monitoring (Student #5)

# Surveille la prod toutes les 15 minutes via /api/monitor/health/.
# Si critical → déclenche le workflow de rollback.

on:
  schedule:
    - cron: '*/15 * * * *'   # toutes les 15 minutes
  workflow_dispatch: {}

jobs:
  probe:
    name: 🔍 Probe production health
    runs-on: ubuntu-latest
    steps:
      - name: Health-check
        id: hc
        env:
          MONITOR_API_URL: ${{ secrets.MONITOR_API_URL }}
          MONITOR_API_KEY: ${{ secrets.MONITOR_API_KEY }}
        run: |
          if [ -z "${MONITOR_API_URL:-}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          set +e
          code=$(curl -sS -o resp.json -w "%{http_code}" \
            -H "X-Monitor-Api-Key: $MONITOR_API_KEY" \
            "$MONITOR_API_URL/api/monitor/health/")
          set -e
          echo "HTTP=$code"
          cat resp.json || true
          echo "code=$code" >> $GITHUB_OUTPUT

      - name: Notify Slack on critical
        if: steps.hc.outputs.code == '503' && env.SLACK != ''
        env:
          SLACK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data '{"text": "🚨 Production en état CRITIQUE — voir dashboard"}' \
            "$SLACK"
